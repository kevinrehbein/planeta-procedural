<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Procedural Planet - WebGL2</title>
    <script src="https://webgl2fundamentals.org/webgl/resources/twgl-full.min.js"></script>
    <script src="https://webgl2fundamentals.org/webgl/resources/m4.js"></script>
    <script src="./stars.js"></script>
    <script src="./planet.js"></script>
    <script src="./objects.js"></script>
    <script src="./main.js" defer></script>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <canvas id="canvas"></canvas>

    <div class="ui-panel">
      <h2>Procedural Planet v1.2</h2>

      <div class="control-group">
        <label>Detail Level: <span id="resValue">250</span></label>
        <input type="range" id="resRange" min="10" max="300" value="250" />
      </div>

      <div class="control-group">
        <label>Noise algorithm:</label>
        <select id="noiseSelect">
          <option value="perlin">Perlin Noise</option>
          <option value="random">Random Chaos</option>
        </select>
      </div>

      <div class="control-group">
        <label>Displacement: <span id="heightValue">0.45</span></label>
        <input type="range" id="heightRange" min="0" max="100" value="45" />
      </div>

      <div class="control-group">
        <label>Sea Level: <span id="seaValue">0</span></label>
        <input type="range" id="seaLevelRange" min="-100" max="100" value="0" />
      </div>

      <div class="control-group">
        <label>Trees: <span id="treeValue">10</span></label>
        <input type="range" id="treeRange" min="0" max="40" value="10" />
      </div>

      <div class="control-group">
        <label>Rocks: <span id="rockValue">10</span></label>
        <input type="range" id="rockRange" min="0" max="40" value="10" />
      </div>

      <div class="control-group">
        <label>Grasses: <span id="grassValue">10</span></label>
        <input type="range" id="grassRange" min="0" max="40" value="10" />
      </div>

      <div class="control-group">
        <label>Clouds: <span id="cloudValue">10</span></label>
        <input type="range" id="cloudRange" min="0" max="20" value="10" />
      </div>

      <div class="control-group">
        <label for="lightspeedRange">Planet Translation Speed:</label>
        <input type="range" id="lightspeedRange" min="0" max="100" value="10" />
      </div>

      <div class="control-group">
        <label for="rotationPlanetRange">Planet Rotation Speed:</label>
        <input
          type="range"
          id="rotationPlanetRange"
          min="0"
          max="100"
          value="2"
        />
      </div>

      <div class="control-group">
        <label>
          <input type="checkbox" id="plantMode" /> Plant Trees Mode
        </label>
      </div>
    </div>
  </body>
</html>
